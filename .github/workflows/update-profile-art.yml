name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC every day

  workflow_dispatch:

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch Ahadiii786 contribution data
        run: python scripts/fetch_contributions.py

      - name: Generate contribution heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit updated contribution graph
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh Ahadiii786 contribution graph"
          file_pattern: "data/*.json contrib-heatmap.svg"
